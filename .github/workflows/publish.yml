name: Release (semantic-release + OIDC publish)

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # to create git tags and commit version bumps
  id-token: write # to enable OIDC trusted publishing & npm provenance

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full git history so semantic-release can analyze all past commits

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Run tests before release
        run: npm test

      - name: Ensure JS entry points are executable
        run: |
          find . -path './node_modules' -prune -o \( -name '*.js' -not -path '*/node_modules/*' \) -exec chmod +x {} + 2>/dev/null || true

      # Step 1: Determine what bump type the commits warrant (featâ†’minor, fixâ†’patch, breakingâ†’major)
      - name: Analyze commits for semver bump type
        id: bump-type
        run: |
          LAST_TAG=$(git tag --list 'v*' | sort -V | tail -1 || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          fi
          
          # Check commit types using our version-bump logic
          BUMP_TYPE=$(node -e "
            const { getReleaseType } = require('./lib/version-bump');
            const commits = \`$COMMITS\`.split('\n').filter(Boolean);
            console.log(getReleaseType(commits) || 'none');
          ")
          
          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "::notice::Commit analysis suggests: $BUMP_TYPE"

      # Step 2: Get authoritative latest version from npm (not git tags)
      - name: Get latest version from npm registry
        id: npm-latest
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LATEST_NPM=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          echo "version=$LATEST_NPM" >> "$GITHUB_OUTPUT"
          echo "::notice::Latest on npm: $LATEST_NPM"

      # Step 3: Calculate new version based on npm latest + commit bump type
      - name: Calculate and apply new version
        run: |
          LATEST_NPM="${{ steps.npm-latest.outputs.version }}"
          BUMP_TYPE="${{ steps.bump-type.outputs.type }}"
          
          IFS='.' read -r MAJ MIN PAT <<< "$LATEST_NPM"
          
          case "$BUMP_TYPE" in
            major) MAJ=$((MAJ + 1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN + 1)); PAT=0 ;;
            patch|none) PAT=$((PAT + 1)) ;;
            *) PAT=$((PAT + 1)) ;;  # default to patch for unknown types
          esac
          
          NEW_VERSION="$MAJ.$MIN.$PAT"
          
          node -e "const p=require('./package.json'); p.version='$NEW_VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          
          echo "::notice::Bumping from npm $LATEST_NPM â†’ $NEW_VERSION ($BUMP_TYPE)"

      # Step 4: Generate CHANGELOG
      - name: Generate CHANGELOG entry
        run: |
          LAST_TAG=$(git tag --list 'v*' | sort -V | tail -1 || echo "")
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"* %s (%h)")
          fi
          
          # Create or update CHANGELOG.md
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          
          TMPFILE=$(mktemp)
          echo "## [$NEW_VERSION] - $(date +%Y-%m-%d)" > "$TMPFILE"
          echo "" >> "$TMPFILE"
          echo "$COMMITS" >> "$TMPFILE"
          echo "" >> "$TMPFILE"
          cat CHANGELOG.md >> "$TMPFILE"
          mv "$TMPFILE" CHANGELOG.md

      # Step 5: Commit version bump + changelog
      - name: Commit version bump and changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore(release): v$NEW_VERSION"

      # Step 6: Publish to npm with OIDC provenance
      - name: Publish to npmjs with trusted publishing (OIDC provenance)
        run: |
          npm publish --provenance --access=public

      # Step 7: Create and push git tag
      - name: Create Git tag and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG" && git push origin "$TAG"
          fi
