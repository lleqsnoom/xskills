name: Release (semantic-release)

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # to create git tags and commit version bumps
  id-token: write # to enable OIDC trusted publishing & npm provenance

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for semantic-release to analyze all past commits

      - name: Setup Node.js (skip registry-url to prevent stale token .npmrc)
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Run tests before release
        run: npm test

      - name: Ensure JS entry points are executable
        run: |
          find . -path './node_modules' -prune -o \( -name '*.js' -not -path '*/node_modules/*' \) -exec chmod +x {} + 2>/dev/null || true

      - name: Remove stale .npmrc auth (force OIDC)
        run: |
          # Delete any cached NPM_TOKEN / _authToken that would make @semantic-release/npm try token auth instead of OIDC.
          rm -f "${HOME}/.npmrc" "$RUNNER_TEMP/.npmrc" .npmrc

      - name: Semantic Release (trusted publishing, no NPM_TOKEN)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN / NODE_AUTH_TOKEN — OIDC trusted publishing via id-token: write only.
        run: npx semantic-release
