name: Release (semantic-release + OIDC publish)

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # to create git tags and commit version bumps
  id-token: write # to enable OIDC trusted publishing & npm provenance

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full git history so semantic-release can analyze all past commits

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Run tests before release
        run: npm test

      - name: Ensure JS entry points are executable
        run: |
          find . -path './node_modules' -prune -o \( -name '*.js' -not -path '*/node_modules/*' \) -exec chmod +x {} + 2>/dev/null || true

      # semantic-release handles: version bump in package.json, CHANGELOG.md generation & commit.
      # We removed @semantic-release/npm to avoid its NPM_TOKEN requirement — OIDC publish is done next step.
      - name: Semantic Release (version bump + changelog)
        run: npx --yes semantic-release

      - name: Publish to npmjs with trusted publishing (OIDC provenance)
        if: success()
        run: |
          npm publish --provenance --access=public

      - name: Create Git tag and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG" && git push origin "$TAG"
          fi
