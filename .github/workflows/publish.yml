name: Publish to npmjs

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Determine version bump type and compute new version
        id: bump
        run: |
          VERSION=$(node -e "const p=require('./package.json'); console.log(p.version)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Find the latest v* tag (handles annotated and lightweight tags)
          LAST_TAG=""
          if git tag --list 'v*' | sort -V | tail -1 | grep -q '^v'; then
            LAST_TAG=$(git tag --list 'v*' | sort -V | tail -1)
          fi

          if [ -z "$LAST_TAG" ]; then
            TYPE="minor"
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
            if echo "$COMMITS" | grep -qE '^feat(\(.+\))?!?:'; then
              TYPE="major"
            elif echo "$COMMITS" | grep -qE '^feat(\(.+\)):'; then
              TYPE="minor"
            else
              TYPE="patch"
            fi
          fi

          case "$TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          node -e "const p=require('./package.json'); p.version='$NEW_VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"

          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate CHANGELOG entry
        run: |
          LAST_TAG=""
          if git tag --list 'v*' | sort -V | tail -1 | grep -q '^v'; then
            LAST_TAG=$(git tag --list 'v*' | sort -V | tail -1)
          fi

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)" HEAD)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"* %s (%h)")
          fi
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          TMPFILE=$(mktemp)
          echo "## [$NEW_VERSION] - $(date +%Y-%m-%d)" > "$TMPFILE"
          echo "" >> "$TMPFILE"
          if [ -f CHANGELOG.md ]; then
            grep -v '^\[Unreleased\]' CHANGELOG.md | head -20 >> "$TMPFILE"
          fi
          echo "" >> "$TMPFILE"
          echo "### Added" >> "$TMPFILE"
          echo "$COMMITS" | head -10 >> "$TMPFILE"
          mv "$TMPFILE" CHANGELOG.md

      - name: Commit version bump and changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit (no new commits since last tag)."
            exit 0
          fi
          git commit -m "chore(release): v${{ steps.bump.outputs.new_version }}"

      - name: Publish to npmjs using PAT
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Ensure all JS entry points have execute permission so npm accepts them
          find . -path './node_modules' -prune -o \( -name '*.js' -not -path '*/node_modules/*' \) -exec chmod +x {} + 2>/dev/null || true

          # Configure npm to use the token for the registry
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          
          # Publish with --access=public for scoped packages
          npm publish --access=public

      - name: Create Git tag and push
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.bump.outputs.new_version }}"
          git tag "$TAG" && git push origin "$TAG"
